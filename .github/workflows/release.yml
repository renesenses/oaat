name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: tune-bridge

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA dev (Linux native)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64-linux)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release -p oaat-cli --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release -p oaat-cli --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="${BINARY_NAME}-${TAG}-${{ matrix.target }}.${{ matrix.archive }}"
          # Version-less alias so `releases/latest/download/<STABLE>` always
          # resolves to the newest release's asset. The versioned name (above)
          # is baked into `latest/download/` URLs, so the moment a new tag ships
          # the old versioned URL 404s (GitHub returns a 9-byte "Not Found" body
          # that `curl -o` happily saves). Publishing this stable-named copy lets
          # docs/install scripts pin a URL once and never break on a bump.
          ARCHIVE_STABLE="${BINARY_NAME}-${{ matrix.target }}.${{ matrix.archive }}"
          BIN="target/${{ matrix.target }}/release/${BINARY_NAME}"
          if [ ! -f "$BIN" ]; then
            echo "Binary not found at $BIN"
            ls -la "target/${{ matrix.target }}/release/" | head -20
            exit 1
          fi
          strip "$BIN" 2>/dev/null || true
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "$BINARY_NAME"
          fi
          cp "$ARCHIVE" "$ARCHIVE_STABLE"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "ARCHIVE_STABLE=$ARCHIVE_STABLE" >> "$GITHUB_ENV"
          ls -lh "$ARCHIVE" "$ARCHIVE_STABLE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE_STABLE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
